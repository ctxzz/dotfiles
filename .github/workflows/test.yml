name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q shellcheck zsh tmux

      - name: Run test suite
        # GitHub Actions ランナーからは dot.omata.me に到達できないため、
        # ネットワーク依存テスト（redirect_test.sh）はCIではスキップする。
        # 到達可能なローカルでは `make test`（フラグ無し）で実行する。
        run: SKIP_NETWORK_TESTS=1 make test
